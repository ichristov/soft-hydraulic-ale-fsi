# .git-nbconfig.yaml

# Keep most notebook content
keep_output: true
keep_count: true
keep_metadata: true
strip_empty_cells: false

# Only strip widget-related content
extra_keys:
  # Strip widget metadata at notebook level
  metadata.widgets: null

  # Strip widget metadata at cell level
  cell.metadata.widgets: null

  # Strip widget view outputs
  cell.outputs.data.application/vnd.jupyter.widget-view+json: null

  # Strip widget state outputs
  cell.outputs.data.application/vnd.jupyter.widget-state+json: null

  # Strip widget model outputs (if present)
  cell.outputs.data.application/vnd.jupyter.widget-model+json: null
